global
    log 127.0.0.1 local2
    chroot /var/lib/haproxy
    pidfile /run/haproxy.pid
    maxconn 4000
    user haproxy
    group haproxy
    daemon
    stats socket /var/lib/haproxy/stats

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    option clitcpka
    option srvtcpka
    retries 2
    timeout connect 5s
    timeout client 1h
    timeout server 1h
    timeout tunnel 1h

frontend xray443_front
    bind *:443
    default_backend xray443_backend

backend xray443_backend
    option tcp-check
    tcp-check connect
    server xray-b 127.0.0.1:2443 check inter 5s fall 2 rise 1
    server xray-a 127.0.0.1:1443 check backup inter 5s fall 2 rise 1

# Raw-TCP fast path for the relay hop only -- no REALITY, server-to-server.
frontend xray_relay_front
    bind *:2096
    default_backend xray_relay_backend

backend xray_relay_backend
    option tcp-check
    tcp-check connect
    server xray-b 127.0.0.1:2444 check inter 5s fall 2 rise 1
    server xray-a 127.0.0.1:1444 check backup inter 5s fall 2 rise 1
